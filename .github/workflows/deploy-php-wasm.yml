name: Deploy php-wasm Worker

on:
  push:
    branches: [main]
    paths:
      - 'apps/php-wasm-worker/**'
      - '.github/workflows/deploy-php-wasm.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-php-wasm
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/php-wasm-worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run typecheck

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/php-wasm-worker
          command: deploy
