name: Deploy FrankenPHP Container

on:
  push:
    branches: [main]
    paths:
      - 'apps/frankenphp-container/**'
      - '.github/workflows/deploy-container.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-container
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/frankenphp-container
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run typecheck

      - name: Smoke-build Docker image
        run: docker build -t cloudflare-php-container-demo:ci .

      - name: Deploy to Cloudflare (Workers + Containers)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/frankenphp-container
          wranglerVersion: "4"
          command: deploy
